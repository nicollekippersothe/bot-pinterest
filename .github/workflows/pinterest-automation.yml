name: Pinterest Automation

on:
  workflow_dispatch:
    inputs:
      products_json:
        description: 'JSON array de produtos para publicar (opcional se shopee_url for fornecida)'
        required: false
        type: string
      shopee_url:
        description: 'URL de busca ou categoria do Shopee para buscar produtos automaticamente'
        required: false
        type: string
      daily_limit:
        description: 'Limite de pins por execução'
        required: false
        default: '5'
        type: string

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: Run Pinterest automation
        run: node scripts/run-automation.js
        env:
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          PRODUCTS_JSON: ${{ inputs.products_json }}
          SHOPEE_URL: ${{ inputs.shopee_url }}
          DAILY_LIMIT: ${{ inputs.daily_limit }}
          CHROMIUM_PATH: /usr/bin/chromium-browser
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}
