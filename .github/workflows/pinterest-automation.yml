name: Pinterest Automation

on:
  workflow_dispatch:
    inputs:
      products_json:
        description: 'JSON array de produtos para publicar'
        required: true
        type: string

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: Run Pinterest automation
        run: node scripts/run-automation.js
        env:
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          PRODUCTS_JSON: ${{ inputs.products_json }}
          CHROMIUM_PATH: /usr/bin/chromium-browser
